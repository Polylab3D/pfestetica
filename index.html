<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title id="page-title">Pagamento MB WAY</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"
  />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --background-color: #f5f5f5;
      --card-background: #ffffff;
      --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);

      --text-color: #1a1a1a;
      --text-secondary: #888888;
      --text-muted: #aaaaaa;
      --divider-color: #f0f0f0;

      --link-bg: #2e7d32;
      --link-hover-bg: #256427;
      --link-text: #ffffff;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--background-color);
    }

    .card {
      width: min(100%, 360px);
      padding: 2.25rem 1.75rem 2rem;
      text-align: center;
      background: var(--card-background);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.25rem;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .label {
      margin-bottom: 0.4rem;
      color: var(--text-secondary);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .phone {
      margin-bottom: 2rem;
      color: var(--text-color);
      font-size: clamp(24px, 7vw, 28px);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .actions {
      display: grid;
      gap: 0.75rem;
    }

    .link-btn {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1rem;
      border: 0;
      border-radius: 12px;
      background: var(--link-bg);
      color: var(--link-text);
      font: inherit;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition:
        background-color 0.15s ease,
        opacity 0.15s ease,
        transform 0.1s ease;
    }

    .link-btn:hover {
      background: var(--link-hover-bg);
    }

    .link-btn:active {
      transform: scale(0.97);
      opacity: 0.88;
    }

    .link-btn i {
      font-size: 20px;
    }

    .is-hidden {
      display: none;
    }

    .toast {
      min-height: 18px;
      margin-top: 0.85rem;
      color: var(--link-bg);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .toast.show {
      opacity: 1;
    }

    .divider {
      width: 100%;
      height: 1px;
      margin: 1.5rem 0;
      background: var(--divider-color);
    }

    .hint {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .hint strong {
      color: var(--text-secondary);
    }

    .footer {
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo-wrap">
      <img id="logo" src="" alt="" />
    </div>

    <p class="label" id="label">Número MB WAY</p>
    <p class="phone" id="phone-display">000 000 000</p>

    <div class="actions">
      <button class="link-btn" id="copy-btn" type="button">
        <i class="ti ti-copy" aria-hidden="true"></i>
        <span id="copy-btn-text">Copiar número</span>
      </button>

      <a class="link-btn is-hidden" id="open-btn" href="#">
        <i class="ti ti-external-link" aria-hidden="true"></i>
        <span id="open-btn-text">Abrir MB WAY agora</span>
      </a>
    </div>

    <p class="toast" id="toast" role="status" aria-live="polite"></p>

    <div class="divider"></div>

    <p class="hint">
      <strong>1.</strong> <span id="step1">Clica no botão para copiar</span>
      &nbsp;·&nbsp;
      <strong>2.</strong> <span id="step2">No MB WAY, cola o número</span>
    </p>

    <footer class="footer">
      <p id="footer-text">© 2026 PolyLAB 3D - Todos os direitos reservados</p>
    </footer>
  </main>

  <script src="config.js"></script>

  <script>
    const ANDROID_STORE =
      "https://play.google.com/store/apps/details?id=pt.sibs.android.mbway";

    const IOS_STORE =
      "https://apps.apple.com/pt/app/mb-way/id918126133";

    const MBWAY_SITE = "https://www.mbway.pt";

    document.addEventListener("DOMContentLoaded", initializePage);

    function initializePage() {
      applyTheme(CONFIG.theme);
      applyContent();

      document
        .getElementById("copy-btn")
        .addEventListener("click", handleCopy);

      document
        .getElementById("open-btn")
        .addEventListener("click", handleOpenMBWay);
    }

    function applyTheme(theme = {}) {
      const root = document.documentElement;

      // Compatível com o config antigo e com o novo padrão "link-*".
      const variables = {
        "--background-color":
          theme["background-color"] ?? theme.backgroundColor,

        "--card-background":
          theme["card-background"] ?? theme.cardBackground,

        "--card-shadow":
          theme["card-shadow"] ?? theme.cardShadow,

        "--text-color":
          theme["text-color"] ?? "#1a1a1a",

        "--text-secondary":
          theme["text-secondary"] ?? "#888888",

        "--text-muted":
          theme["text-muted"] ?? "#aaaaaa",

        "--divider-color":
          theme["divider-color"] ?? "#f0f0f0",

        "--link-bg":
          theme["link-bg"] ?? theme.primaryColor,

        "--link-hover-bg":
          theme["link-hover-bg"] ?? theme.primaryColorHover,

        "--link-text":
          theme["link-text"] ?? "#ffffff"
      };

      Object.entries(variables).forEach(([name, value]) => {
        if (value) {
          root.style.setProperty(name, value);
        }
      });
    }

    function applyContent() {
      document.getElementById("page-title").textContent =
        CONFIG.text.pageTitle;

      document.getElementById("label").textContent =
        CONFIG.text.label;

      document.getElementById("phone-display").textContent =
        CONFIG.mbway.phoneDisplay;

      document.getElementById("copy-btn-text").textContent =
        CONFIG.text.buttonText;

      document.getElementById("open-btn-text").textContent =
        CONFIG.text.openButtonText ?? "Abrir MB WAY agora";

      document.getElementById("step1").textContent =
        CONFIG.text.step1;

      document.getElementById("step2").textContent =
        CONFIG.text.step2;

      document.getElementById("footer-text").textContent =
        (CONFIG.footer && CONFIG.footer.text)
          ? CONFIG.footer.text
          : "© 2026 PolyLAB 3D - Todos os direitos reservados";

      const logo = document.getElementById("logo");
      logo.src = CONFIG.business.logoFile;
      logo.alt = CONFIG.business.name;
    }

    async function handleCopy() {
      try {
        await copyText(CONFIG.mbway.phoneValue);

        showToast(CONFIG.text.successMessage);

        document
          .getElementById("open-btn")
          .classList.remove("is-hidden");
      } catch {
        showToast(CONFIG.text.errorMessage);
      }
    }

    async function copyText(value) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = value;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";

      document.body.appendChild(textarea);
      textarea.select();

      const copied = document.execCommand("copy");
      textarea.remove();

      if (!copied) {
        throw new Error("Não foi possível copiar.");
      }
    }

    function handleOpenMBWay(event) {
      event.preventDefault();

      const userAgent = navigator.userAgent.toLowerCase();
      const isAndroid = userAgent.includes("android");
      const isIOS = /iphone|ipad|ipod/.test(userAgent);

      if (isAndroid) {
        window.location.assign(ANDROID_STORE);
        return;
      }

      if (isIOS) {
        openIOSApp();
        return;
      }

      window.location.assign(MBWAY_SITE);
    }

    function openIOSApp() {
      const startedAt = Date.now();

      window.location.href = "mbway://";

      window.setTimeout(() => {
        const appProbablyDidNotOpen = Date.now() - startedAt < 3000;

        if (appProbablyDidNotOpen && !document.hidden) {
          window.location.href = IOS_STORE;
        }
      }, 2000);
    }

    let toastTimer;

    function showToast(message) {
      const toast = document.getElementById("toast");

      window.clearTimeout(toastTimer);

      toast.textContent = message;
      toast.classList.add("show");

      toastTimer = window.setTimeout(() => {
        toast.classList.remove("show");
      }, 3500);
    }
  </script>
</body>
</html>
